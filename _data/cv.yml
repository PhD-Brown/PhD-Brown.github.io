- title: Research Projects
  type: time_table
  contents:
    - title: AstroSpectro — Interpretable ML Pipeline for Stellar Spectroscopy
      year: 2025–now
      description:
        - "End-to-end pipeline for stellar spectral classification on 43,000 LAMOST DR5 spectra cross-matched with Gaia DR3. XGBoost classifier with 183 physics-based descriptors, ROC-AUC 0.964, 87% balanced accuracy."
        - "Key finding — SHAP analysis reveals metallicity-sensitive features (Ca II H&K, Mg b) systematically outrank temperature-proxy features (Balmer series). Manuscript in preparation for Research Notes of the AAS (RNAAS)."
        - "Full documentation at phd-brown.github.io/AstroSpectro. 85+ experiment runs tracked with Weights & Biases."

    - title: AstroVision — Deep Learning for Galaxy Morphological Classification
      year: 2025–now
      description:
        - "Late-fusion multimodal classifier combining DINOv2 visual features, non-parametric morphometrics (CAS, Gini, M20), and SDSS photometry on Galaxy10 DECaLS (17,736 images, 10 classes)."
        - "86.3% balanced accuracy. Includes MC Dropout uncertainty quantification, conformal prediction, and attention-guided morphometry."

    - title: Xi Dark Energy — Bayesian Cosmological Inference
      year: 2025–now
      description:
        - "Bayesian MCMC analysis comparing ΛCDM, CPL, and oscillating dark energy using Pantheon+SH0ES supernovae and DESI DR2 BAO data. Implemented with emcee."

