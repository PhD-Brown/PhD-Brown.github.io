- title: Research Projects
  type: time_table
  contents:
    - title: >
        <a href="https://github.com/PhD-Brown/AstroSpectro">AstroSpectro</a>
        — Interpretable ML Pipeline for Stellar Spectroscopy
      year: 2025–now
      description:
        - >
          End-to-end pipeline for stellar spectral classification on 43,000 LAMOST DR5
          spectra cross-matched with Gaia DR3, combining physics-based feature
          extraction (183 spectroscopic descriptors), supervised classification
          (XGBoost, ROC-AUC 0.964, 87% balanced accuracy), dimensionality reduction
          (PCA, UMAP, autoencoder), and SHAP interpretability.
        - >
          Key scientific finding — SHAP analysis reveals that metallicity-sensitive
          features (Ca II H&K, Mg b) systematically outrank temperature-proxy features
          (Balmer series) in the learned classification structure.
          Manuscript in preparation for <i>Research Notes of the AAS</i> (RNAAS).
        - >
          Full documentation at
          <a href="https://phd-brown.github.io/AstroSpectro/">phd-brown.github.io/AstroSpectro</a>.
          85+ experiment runs tracked with Weights & Biases.

    - title: >
        <a href="https://github.com/PhD-Brown/AstroVision">AstroVision</a>
        — Deep Learning for Galaxy Morphological Classification
      year: 2025–now
      description:
        - >
          Late-fusion multimodal classifier combining DINOv2 visual features,
          non-parametric morphometrics (CAS, Gini, M20), and SDSS photometry
          on the Galaxy10 DECaLS dataset (17,736 RGB images, 10 morphology classes).
        - >
          Achieved 86.3% balanced accuracy. Includes MC Dropout uncertainty
          quantification, conformal prediction, and attention-guided morphometry.
          Full A&A-format paper produced.

    - title: >
        <a href="https://github.com/PhD-Brown/xi-dark-energy-bao-mcmc">ξ Dark Energy · BAO MCMC</a>
        — Bayesian Cosmological Inference
      year: 2025–now
      description:
        - >
          Bayesian MCMC analysis comparing ΛCDM, CPL, and oscillating dark energy
          (Ξosc) parameterisations using Pantheon+SH0ES supernovae and DESI DR2
          BAO data. Implemented with <code>emcee</code>; AIC/BIC model comparison.
        - >
          Exploratory release (v0.1.0) with fully documented limitations
          and reproducible inference pipeline.

